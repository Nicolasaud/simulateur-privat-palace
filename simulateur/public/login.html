<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion — Simulateur Palace Comedy</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; font-size: 14px; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

  .loginCard { background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 32px 36px; max-width: 420px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
  .loginHeader { display: inline-flex; align-items: center; gap: 16px; text-decoration: none; padding: 4px 0; margin-bottom: 6px; }
  .loginHeader img { height: 40px; width: auto; display: block; }
  .loginHeader .tagline { font-family: 'Lexend', sans-serif; font-weight: 800; font-size: 22px; color: #1a1f3c; letter-spacing: -0.01em; border-left: 2px solid #e5e7eb; padding-left: 16px; line-height: 1; white-space: nowrap; }
  .subtitle { color: #666; font-size: 0.88em; margin-bottom: 24px; }

  label { display: block; font-size: 0.82em; color: #444; margin: 16px 0 6px; font-weight: 500; font-family: 'Lexend', sans-serif; }
  input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95em; font-family: inherit; background: white; }
  input:focus { outline: 2px solid #4a80d6; outline-offset: -1px; border-color: transparent; }

  .nomGroup { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 4px; }
  .nomOpt { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 0.92em; background: white; transition: border-color 0.1s; }
  .nomOpt:has(input:checked) { border-color: #1a1a1a; background: #f4f4f4; }
  .nomOpt input { margin: 0; }

  button.primary { margin-top: 22px; width: 100%; padding: 11px; background: #1a1a1a; color: white; border: 1px solid #1a1a1a; border-radius: 6px; cursor: pointer; font-family: 'Lexend', sans-serif; font-weight: 500; font-size: 0.95em; }
  button.primary:hover { background: #333; }
  button.primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .errorBox { margin-top: 14px; padding: 10px 13px; background: #ffe6e6; color: #8a1a1a; border-left: 3px solid #c00; border-radius: 4px; font-size: 0.88em; display: none; }
  .errorBox.show { display: block; }

  .footer { margin-top: 26px; font-size: 0.78em; color: #888; text-align: center; }
</style>
</head>
<body>

<div class="loginCard">
  <div class="loginHeader">
    <img src="/assets/logo-palace.svg" alt="Palace Comedy">
    <span class="tagline">Privat &amp; Co</span>
  </div>
  <p class="subtitle">Connexion équipe — code d'accès partagé</p>

  <form id="loginForm" autocomplete="off">
    <label for="code">Code d'accès</label>
    <input type="password" id="code" name="code" required autofocus>

    <label>Qui es-tu ?</label>
    <div class="nomGroup" id="nomGroup">
      <label class="nomOpt"><input type="radio" name="nom" value="Nicolas" required> Nicolas</label>
      <label class="nomOpt"><input type="radio" name="nom" value="Lucie"> Lucie</label>
      <label class="nomOpt"><input type="radio" name="nom" value="Benjamin"> Benjamin</label>
      <label class="nomOpt"><input type="radio" name="nom" value="Autre"> Autre</label>
    </div>

    <button type="submit" class="primary" id="submitBtn">Entrer</button>
    <div class="errorBox" id="errorBox"></div>
  </form>

  <p class="footer">Session valable 30 jours, renouvelée à chaque visite.</p>
</div>

<script type="module">
  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('errorBox');
  const submitBtn = document.getElementById('submitBtn');

  // Pré-sélection si on a un prénom mémorisé
  const lastNom = localStorage.getItem('palace_nom');
  if (lastNom) {
    const radio = form.querySelector(`input[name="nom"][value="${lastNom}"]`);
    if (radio) radio.checked = true;
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }
  function clearError() {
    errorBox.classList.remove('show');
    errorBox.textContent = '';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    clearError();
    const code = form.code.value;
    const nom = (form.querySelector('input[name="nom"]:checked') || {}).value;
    if (!code || !nom) {
      showError('Code et prénom requis.');
      return;
    }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Connexion…';
    try {
      const r = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ code, nom })
      });
      if (r.ok) {
        const data = await r.json();
        localStorage.setItem('palace_nom', data.nom);
        window.location.href = '/';
        return;
      }
      if (r.status === 401) showError('Code incorrect.');
      else if (r.status === 400) showError('Champs invalides.');
      else if (r.status === 500) showError('Configuration serveur manquante. Vérifie .env.');
      else showError(`Erreur inattendue (${r.status}).`);
    } catch (err) {
      showError('Impossible de joindre le serveur : ' + err.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrer';
    }
  });
</script>

</body>
</html>
